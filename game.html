<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ColorGuesser</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lacquer&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="index.html">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="script.js">
    <link rel="stylesheet" href="hall_of_fame.html">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

</head>
<body>

    <h1 style="margin-bottom: 2vw; margin-left: 2vw;">ColorGuesser</h1>
    <a href="index.html">
        <h1 style="margin-bottom: 7vw; margin-left: 2vw; font-size: 2vw; margin-bottom: 10vw;">↩︎ Menu</h1>
    </a>

    <div class="animate__animated animate__bounceIn">
        <div class="container">

    <p style="margin-left: 12vw; margin-right: 12vw; outline: 0.3vw solid rgb(0, 140, 86); color: rgb(0, 140, 86); margin-bottom: 7vw;"><ins>HOW TO PLAY:</ins><br>A random color will be shown in the box below. You will get a peak at it as long as you set the time for it. Memorize the color and try to mix it yourself using the RGB slider under the box.</p>
    <label for="timeInput">Time to view color (seconds): </label>
    <input style="width: 1.7rem; height: 1.3rem; border-radius: 0.3rem;" type="number" id="timeInput" min="1" value="1" max="10">

    <br><button class="greenButton" style="background-color: rgb(0, 140, 86); margin-top: 3vw; margin-bottom: 3vw;" id="startBtn">Start Game / Play Again</button>

    <br><br>

    <div id="colorBox"></div>

    <br>

    <div id="controls" style="display:none;">
        <label style="color: red;">R</label>
        <input style="width: 27vw; cursor: grab;" type="range" id="rRange" min="0" max="255">
        <span id="rValue">0</span>

        <br>

        <label style="color: rgb(0, 255, 0);">G</label>
        <input style="width: 27vw; cursor: grab;" type="range" id="gRange" min="0" max="255">
        <span id="gValue">0</span>

        <br>

        <label style="color: blue;">B</label>
        <input style="width: 27vw; cursor: grab;" type="range" id="bRange" min="0" max="255">
        <span id="bValue">0</span>

        <br><br>

        <button class="whiteButton" id="submitBtn">Submit Guess</button>
    </div>
    
    <p id="feedback"></p>
    <p id="result"></p>
    <canvas id="shareCanvas" width="600" height="600" style="display:none;"></canvas>
    <button class="blueButton" id="shareBtn" style="background-color: rgb(0, 128, 255); margin-top: 1.5vw;" onclick="generateAndShare()">Share my Results <img style="width: 1vw;" src="share-sharing-icon-29.png" alt=""></button>

        </div>
    </div>

    <script src="script.js"></script>

    <style>
        @keyframes rotateColors {
            0%   { color: red; }
            12.5%  { color: rgb(255, 98, 0); }
            25%  { color: yellow; }
            37.5%  { color: rgb(0, 255, 0); }
            50%  { color: rgb(0, 213, 255); }
            62.5%  { color: blue; }
            75%  { color: rgb(162, 0, 255); }
            87.5% { color: rgb(255, 255, 255); }
            100%  { color: rgb(255, 255, 255); }
        }

        footer {
            animation: rotateColors 18s steps(1) infinite;
            animation-delay: 2s;
        }
    </style>

    <footer>
        <br>
        © 2026 orange171 <br>All Rights reserved!
        <br>
        <a href="https://github.com/ORANGE171" target="_blank">
            <img class="githubIcon" style="width: 2rem; margin-top: 3rem;" src="github-white-icon.webp" title="GitHub - ORANGE171" alt="GitHub">
        </a>

    </footer>

</body>
</html>
