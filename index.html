<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Menu</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lacquer&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="game.html">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="script.js">
    <link rel="stylesheet" href="hall_of_fame.html">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

</head>
<body>

    <h2>ColorGuesser</h2>

    <div class="animate__animated animate__bounceIn">
    <div class="container">
    <a href="game.html">
        <button class="greenButton" style="background-color: rgb(0, 140, 86); margin-top: 3rem; margin-bottom: 1rem;">Play</button>
    </a>
    <br>
    <a href="hall_of_fame.html">
        <button class="yellowButton" style="background-color: gold; margin-bottom: 1rem;">Hall of Fame</button>
    </a>
    </div>
    </div>

    <style>
        @keyframes rotateColors {
            0%   { color: red; }
            12.5%  { color: rgb(255, 98, 0); }
            25%  { color: yellow; }
            37.5%  { color: rgb(0, 255, 0); }
            50%  { color: rgb(0, 213, 255); }
            62.5%  { color: blue; }
            75%  { color: rgb(162, 0, 255); }
            87.5% { color: rgb(255, 255, 255); }
            100%  { color: rgb(255, 255, 255); }
        }

        h2 {
            animation: rotateColors 18s steps(1) infinite;
            animation-delay: 2s;
        }
    </style>

    <style>
        @keyframes rotateColors {
            0%   { color: red; }
            12.5%  { color: rgb(255, 98, 0); }
            25%  { color: yellow; }
            37.5%  { color: rgb(0, 255, 0); }
            50%  { color: rgb(0, 213, 255); }
            62.5%  { color: blue; }
            75%  { color: rgb(162, 0, 255); }
            87.5% { color: rgb(255, 255, 255); }
            100%  { color: rgb(255, 255, 255); }
        }

        footer {
            animation: rotateColors 18s steps(1) infinite;
            animation-delay: 2s;
        }
    </style>
    
    <footer>

        </a>

    </footer>
</body>
</html>
